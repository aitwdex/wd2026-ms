<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>札幌の天気</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container my-4 d-flex justify-content-center">
    <div id="result" class="card mt-3" style="width: 25rem;">
        <img src="img/sapporo.jpg" class="card-img-top" alt="札幌時計台">
        <div class="card-body">
        <h5 class="card-title">札幌の天気</h5>
        <p id="temp" class="card-text">ボタンを押してください</p>
        <button id="getBtn" class="btn btn-outline-primary">天気を取得</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
<!-- ページの一番下などに、データの出典を表示する -->
<footer>
  <small>Weather data by <a href="https://open-meteo.com/">Open-Meteo.com</a>（CC BY 4.0）</small>
</footer>
</body>
</html>
