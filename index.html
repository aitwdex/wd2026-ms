<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>札幌の天気</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
.container {
  display: flex;
  justify-content: center;
}

.card {
  width: 100%;
  max-width: 25rem;
}

@media (max-width: 600px) {
  .container {
    flex-direction: column;
    align-items: center;
  }

  .card {
    max-width: 100%;
  }
}
</style>
</head>
<body>
  <div class="container">
    <div id="result" class="card card-body">
        <img src="img/sapporo.jpg" class="card-img-top" alt="札幌時計台">
        <h5 class="card-title">札幌の天気</h5>
        <p id="temp" class="card-text">ボタンを押してください</p>
        <button id="getBtn" class="btn btn-outline-primary">天気を取得</button>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
<!-- ページの一番下などに、データの出典を表示する -->
<footer>
  <small>Weather data by <a href="https://open-meteo.com/">Open-Meteo.com</a>（CC BY 4.0）</small>
</footer>
</body>
</html>
